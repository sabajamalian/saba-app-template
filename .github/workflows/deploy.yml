name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # Skip on the template repo itself; only repos created from the template should deploy.
    if: ${{ github.event.repository.is_template == false }}
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      AKS_NAME: ${{ vars.AKS_NAME }}
      AKS_RG: ${{ vars.AKS_RG }}
      APP_NAME: ${{ github.event.repository.name }}
      APP_HOSTNAME: ${{ vars.APP_HOSTNAME }}
      IMAGE_TAG: ${{ github.sha }}
      # Idea metadata, set by the Innovation Seed orchestrator. Safe to leave
      # empty; the template's landing page degrades gracefully when missing.
      IDEA_DESCRIPTION: ${{ vars.IDEA_DESCRIPTION }}
      IDEA_CREATOR_LOGIN: ${{ vars.IDEA_CREATOR_LOGIN }}
      IDEA_CREATOR_AVATAR_URL: ${{ vars.IDEA_CREATOR_AVATAR_URL }}
      IDEA_CREATED_AT: ${{ vars.IDEA_CREATED_AT }}
    steps:
      - uses: actions/checkout@v4

      - name: Sanity check repo variables
        id: sanity
        run: |
          missing=()
          for v in ACR_NAME AKS_NAME AKS_RG APP_HOSTNAME; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            # When a repo is created from this template, GitHub fires this
            # workflow on the initial commit before Innovation Seed has had
            # a chance to set the per-repo Actions Variables. The orchestrator
            # dispatches a fresh run as soon as the variables are populated,
            # so we just exit cleanly here instead of marking the run failed.
            {
              echo "### First-deploy notice"
              echo ""
              echo "Repo variables not yet populated: \`${missing[*]}\`."
              echo ""
              echo "Innovation Seed sets these as part of provisioning and will"
              echo "kick off a fresh deploy automatically. If this run was not"
              echo "triggered by Innovation Seed (manual push, fork, etc.), run"
              echo "\`scripts/bootstrap.sh\` once to populate them."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "APP_NAME=$APP_NAME"
          echo "IMAGE=$ACR_NAME.azurecr.io/$APP_NAME:$IMAGE_TAG"
          echo "HOSTNAME=$APP_HOSTNAME"

      - name: Azure login (OIDC, no secrets)
        if: steps.sanity.outputs.skip != 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        if: steps.sanity.outputs.skip != 'true'
        run: |
          # Retry to ride out RBAC propagation: when a brand-new managed identity
          # gets Contributor on the ACR, Azure can take a few minutes before the
          # role is observable. The error in that window is "resource not found".
          attempt=1
          max=8
          until az acr build \
              --registry "$ACR_NAME" \
              --image "$APP_NAME:$IMAGE_TAG" \
              --image "$APP_NAME:latest" \
              --file Dockerfile \
              .; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::az acr build failed after $attempt attempts"
              exit 1
            fi
            sleep_for=$((attempt * 30))
            echo "az acr build failed (attempt $attempt/$max). Sleeping ${sleep_for}s and retrying..."
            sleep "$sleep_for"
            attempt=$((attempt + 1))
          done

      - name: Get AKS credentials
        if: steps.sanity.outputs.skip != 'true'
        run: |
          attempt=1
          max=6
          until az aks get-credentials -g "$AKS_RG" -n "$AKS_NAME" --overwrite-existing; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::az aks get-credentials failed after $attempt attempts"
              exit 1
            fi
            sleep_for=$((attempt * 20))
            echo "get-credentials failed (attempt $attempt/$max). Sleeping ${sleep_for}s and retrying..."
            sleep "$sleep_for"
            attempt=$((attempt + 1))
          done
          kubelogin convert-kubeconfig -l azurecli || true

      - name: Render and apply manifests
        if: steps.sanity.outputs.skip != 'true'
        run: |
          export IMAGE="$ACR_NAME.azurecr.io/$APP_NAME:$IMAGE_TAG"
          export HOSTNAME="$APP_HOSTNAME"
          IDEA_REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          mkdir -p .rendered
          for f in k8s/*.yaml; do
            envsubst '${APP_NAME} ${IMAGE} ${HOSTNAME}' < "$f" > ".rendered/$(basename "$f")"
          done
          # Ensure namespace exists (bootstrap creates it; this is idempotent insurance).
          kubectl create namespace "$APP_NAME" --dry-run=client -o yaml | kubectl apply -f -
          # Build the idea ConfigMap with kubectl so arbitrary text (newlines,
          # quotes, colons) in IDEA_DESCRIPTION is encoded safely.
          kubectl create configmap "$APP_NAME-idea" \
            --namespace "$APP_NAME" \
            --from-literal=IDEA_DESCRIPTION="${IDEA_DESCRIPTION:-}" \
            --from-literal=IDEA_CREATOR_LOGIN="${IDEA_CREATOR_LOGIN:-}" \
            --from-literal=IDEA_CREATOR_AVATAR_URL="${IDEA_CREATOR_AVATAR_URL:-}" \
            --from-literal=IDEA_CREATED_AT="${IDEA_CREATED_AT:-}" \
            --from-literal=IDEA_REPO_URL="$IDEA_REPO_URL" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f .rendered/

      - name: Wait for rollout
        if: steps.sanity.outputs.skip != 'true'
        run: |
          kubectl -n "$APP_NAME" rollout status deployment/"$APP_NAME" --timeout=180s

      - name: Summary
        if: steps.sanity.outputs.skip != 'true'
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- App: \`$APP_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://$APP_HOSTNAME" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`$ACR_NAME.azurecr.io/$APP_NAME:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
