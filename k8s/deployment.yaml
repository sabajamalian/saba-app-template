apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}
  namespace: ${APP_NAME}
  labels:
    app: ${APP_NAME}
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ${APP_NAME}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ${APP_NAME}
    spec:
      containers:
        - name: app
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            # Idea metadata (IDEA_DESCRIPTION, IDEA_CREATOR_LOGIN, ...) populated
            # by the Innovation Seed orchestrator and built into a ConfigMap at
            # deploy time. Optional so apps that drop the default landing page
            # don't need to keep the ConfigMap around.
            - configMapRef:
                name: ${APP_NAME}-idea
                optional: true
          env:
            - name: APP_NAME
              value: ${APP_NAME}
            - name: APP_HOSTNAME
              value: ${HOSTNAME}
            # The block below is populated by scripts/enable-database.sh.
            # While the secret does not exist (stateless apps), optional: true
            # makes Kubernetes silently skip these env vars at pod start.
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: host
                  optional: true
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: port
                  optional: true
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: database
                  optional: true
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: username
                  optional: true
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: password
                  optional: true
            - name: PGSSLMODE
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: sslmode
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ${APP_NAME}-db-credentials
                  key: DATABASE_URL
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
